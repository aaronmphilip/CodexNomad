name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go:
    name: Go / ${{ matrix.module }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        module:
          - daemon
          - services/relay
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

  flutter:
    name: Flutter Android
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: apps/android/flutter-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check Dart formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test --no-pub

      - name: Build debug APK
        run: flutter build apk --debug --no-pub

      - name: Create CI-only Android signing key
        shell: bash
        run: |
          mkdir -p android/keystores
          keytool -genkeypair \
            -v \
            -keystore android/keystores/codexnomad-ci-upload.jks \
            -storepass codexnomad-ci \
            -keypass codexnomad-ci \
            -alias codexnomad-ci \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Codex Nomad CI,O=Codex Nomad,C=US"
          cat > android/key.properties <<'EOF'
          storePassword=codexnomad-ci
          keyPassword=codexnomad-ci
          keyAlias=codexnomad-ci
          storeFile=../keystores/codexnomad-ci-upload.jks
          EOF
          test -s android/key.properties
          test -s android/keystores/codexnomad-ci-upload.jks

      - name: Build release app bundle
        run: flutter build appbundle --release --no-pub

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          if-no-files-found: error
          path: |
            apps/android/flutter-app/build/app/outputs/flutter-apk/app-debug.apk
            apps/android/flutter-app/build/app/outputs/bundle/release/app-release.aab
